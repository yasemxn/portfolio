<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect all unknown routes to the React app
      var l = window.location;
      l.replace(
        l.protocol +
        "//" +
        l.hostname +
        (l.port ? ":" + l.port : "") +
        "/portfolio/?" +
        l.pathname.slice(1) +
        l.search +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
