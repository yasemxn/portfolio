<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      var l = window.location;
      var path = l.pathname.replace('/portfolio', ''); // Remove the 'portfolio' base path
      window.location.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + "/portfolio/#" + path + l.search
      );
    </script>
    
  </head>
  <body>
    Redirecting...
  </body>
</html>
